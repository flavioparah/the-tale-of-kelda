<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Tale of Kelda</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --gb-black:#0a0f0a;--gb-dark:#1a2e1a;--gb-mid:#2d5a27;
      --gb-light:#5a9e4a;--gb-pale:#8dc67a;--gb-bright:#c8d468;--gb-white:#e8f8b0;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:var(--gb-black);color:var(--gb-white);
      font-family:'Press Start 2P',monospace;min-height:100vh;
      display:flex;flex-direction:column;align-items:center;overflow-x:hidden;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.18) 2px,rgba(0,0,0,0.18) 4px);
      pointer-events:none;z-index:9999;
    }
    header{width:100%;max-width:1060px;padding:28px 24px 0;display:flex;flex-direction:column;align-items:center;}
    .eyebrow{font-family:'VT323',monospace;font-size:18px;letter-spacing:6px;color:var(--gb-pale);margin-bottom:4px;}
    .title{font-size:clamp(18px,3vw,30px);color:var(--gb-bright);text-shadow:3px 3px 0 var(--gb-mid),6px 6px 0 var(--gb-dark);letter-spacing:2px;line-height:1.4;}
    .sub{font-family:'VT323',monospace;font-size:16px;color:var(--gb-pale);opacity:.7;margin-top:8px;letter-spacing:4px;}
    .divider{width:100%;max-width:960px;height:4px;margin:18px auto 0;background:repeating-linear-gradient(90deg,var(--gb-mid) 0 8px,transparent 8px 12px);}
    .layout{width:100%;max-width:1060px;padding:0 24px 40px;display:grid;grid-template-columns:200px 1fr;gap:20px;align-items:start;margin-top:20px;}
    .panel-label{font-size:7px;letter-spacing:3px;color:var(--gb-pale);border-bottom:2px solid var(--gb-mid);padding-bottom:8px;margin-bottom:8px;}
    .ctrl-group{display:flex;flex-direction:column;gap:10px;}
    .ctrl-item{padding:10px;background:var(--gb-dark);border:2px solid var(--gb-mid);border-left:4px solid var(--gb-light);}
    .ctrl-action{font-family:'VT323',monospace;font-size:13px;color:var(--gb-pale);margin-bottom:5px;}
    .ctrl-keys{display:flex;flex-wrap:wrap;gap:4px;align-items:center;}
    .key{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--gb-black);background:var(--gb-bright);padding:3px 6px;border:2px solid var(--gb-white);border-bottom:4px solid var(--gb-mid);border-right:4px solid var(--gb-mid);}
    .sep{font-family:'VT323',monospace;font-size:12px;color:var(--gb-mid);}
    .note{font-family:'VT323',monospace;font-size:11px;color:var(--gb-light);opacity:.8;margin-top:3px;}
    .game-wrap{display:flex;flex-direction:column;}
    .bezel{background:var(--gb-dark);border:3px solid var(--gb-mid);box-shadow:0 0 24px rgba(90,158,74,.2),inset 0 0 12px rgba(0,0,0,.5);position:relative;}
    .screen-surr{margin:14px;background:var(--gb-black);border:3px solid var(--gb-mid);position:relative;}
    #vnc-canvas-wrap{width:100%;aspect-ratio:960/864;background:var(--gb-black);position:relative;overflow:hidden;}
    #vnc-status{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:var(--gb-black);z-index:5;transition:opacity .5s;}
    #vnc-status.hidden{opacity:0;pointer-events:none;}
    .loading-txt{font-size:8px;color:var(--gb-pale);animation:blink 1s step-end infinite;}
    .bar-wrap{width:160px;height:12px;border:2px solid var(--gb-mid);}
    .bar{height:100%;background:var(--gb-light);width:0;transition:width .5s;}
    .bezel-bot{padding:8px 14px;display:flex;justify-content:space-between;align-items:center;}
    .brand{font-size:6px;color:var(--gb-mid);letter-spacing:2px;}
    .dots{display:flex;gap:5px;}
    .dot{width:5px;height:5px;background:var(--gb-mid);}
    .status-bar{display:flex;justify-content:space-between;padding:6px 14px;background:var(--gb-dark);border:2px solid var(--gb-mid);border-top:none;font-family:'VT323',monospace;font-size:13px;}
    .sdot{width:8px;height:8px;background:var(--gb-light);display:inline-block;margin-right:6px;animation:blink 1.4s step-end infinite;}
    .sdot.ok{background:var(--gb-bright);animation:none;}
    .shint{color:var(--gb-mid);font-size:11px;}
    /* noVNC canvas fica aqui dentro */
    #noVNC_canvas{width:100%;height:100%;image-rendering:pixelated;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    @media(max-width:720px){
      .layout{grid-template-columns:1fr;}
      .ctrl-group{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
      .panel-label{grid-column:1/-1;}
    }
  </style>
</head>
<body>
<header>
  <div style="text-align:center">
    <div class="eyebrow">▸ adventure awaits ◂</div>
    <div class="title">THE TALE OF KELDA</div>
    <div class="sub">── beta ──</div>
  </div>
  <div class="divider"></div>
</header>

<div class="layout">
  <aside>
    <div class="panel-label">controls</div>
    <div class="ctrl-group">
      <div class="ctrl-item">
        <div class="ctrl-action">Start Game</div>
        <div class="ctrl-keys"><span class="key">ENTER</span></div>
      </div>
      <div class="ctrl-item">
        <div class="ctrl-action">Move</div>
        <div class="ctrl-keys"><span class="key">◄</span><span class="key">▲</span><span class="key">▼</span><span class="key">►</span></div>
      </div>
      <div class="ctrl-item">
        <div class="ctrl-action">Jump</div>
        <div class="ctrl-keys"><span class="key">X</span><span class="sep">/</span><span class="key">▲</span></div>
        <div class="note">double jump available</div>
      </div>
      <div class="ctrl-item">
        <div class="ctrl-action">Melee Power</div>
        <div class="ctrl-keys"><span class="key">Z</span><span class="sep">tap</span></div>
        <div class="note">deflects enemy fire</div>
      </div>
      <div class="ctrl-item">
        <div class="ctrl-action">Ranged Power</div>
        <div class="ctrl-keys"><span class="key">Z</span><span class="sep">hold</span></div>
      </div>
    </div>
  </aside>

  <div class="game-wrap">
    <div class="bezel">
      <div class="screen-surr">
        <div id="vnc-canvas-wrap">
          <div id="vnc-status">
            <div class="title" style="font-size:10px">LOADING</div>
            <div class="bar-wrap"><div class="bar" id="bar"></div></div>
            <div class="loading-txt" id="load-txt">connecting...</div>
          </div>
          <!-- noVNC injeta o canvas aqui -->
        </div>
      </div>
      <div class="bezel-bot">
        <span class="brand">sinextra · retro game</span>
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      </div>
    </div>
    <div class="status-bar">
      <span><span class="sdot" id="sdot"></span><span id="stxt">connecting…</span></span>
      <span class="shint">click game to capture keyboard</span>
    </div>
  </div>
</div>

<!-- noVNC core -->
<script type="module">
import RFB from '/core/rfb.js';

const host   = window.location.hostname;
const port   = window.location.port || (location.protocol === 'https:' ? 443 : 80);
const path   = 'websockify';
const url    = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${host}:${port}/${path}`;

const wrap   = document.getElementById('vnc-canvas-wrap');
const status = document.getElementById('vnc-status');
const bar    = document.getElementById('bar');
const loadTxt = document.getElementById('load-txt');
const sdot   = document.getElementById('sdot');
const stxt   = document.getElementById('stxt');

// Animação da barra de progresso
let pct = 0;
const timer = setInterval(() => {
  pct = Math.min(pct + 2, 90);
  bar.style.width = pct + '%';
}, 400);

loadTxt.textContent = 'connecting to server...';

const rfb = new RFB(wrap, url, { credentials: {} });

rfb.scaleViewport = true;
rfb.resizeSession = false;

rfb.addEventListener('connect', () => {
  clearInterval(timer);
  bar.style.width = '100%';
  setTimeout(() => status.classList.add('hidden'), 600);
  sdot.classList.add('ok');
  stxt.textContent = 'connected';
  rfb.focus();
});

rfb.addEventListener('disconnect', (e) => {
  sdot.classList.remove('ok');
  stxt.textContent = e.detail.clean ? 'disconnected' : 'connection lost — reload to retry';
  status.classList.remove('hidden');
  loadTxt.textContent = 'disconnected';
  bar.style.width = '0';
});

rfb.addEventListener('credentialsrequired', () => {
  rfb.sendCredentials({ password: '' });
});
</script>
</body>
</html>
