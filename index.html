<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Tale of Kelda</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gb-black:   #0a0f0a;
      --gb-dark:    #1a2e1a;
      --gb-mid:     #2d5a27;
      --gb-light:   #5a9e4a;
      --gb-pale:    #8dc67a;
      --gb-screen:  #9bbc0f;
      --gb-bright:  #c8d468;
      --gb-white:   #e8f8b0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--gb-black);
      color: var(--gb-white);
      font-family: 'Press Start 2P', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ── scanline overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.18) 2px,
        rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── pixel noise vignette ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 55%,
        rgba(0,0,0,0.65) 100%);
      pointer-events: none;
      z-index: 9998;
    }

    /* ══════════════ HEADER ══════════════ */
    header {
      width: 100%;
      max-width: 1060px;
      padding: 28px 24px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .title-block {
      text-align: center;
      position: relative;
    }

    .title-eyebrow {
      font-family: 'VT323', monospace;
      font-size: 18px;
      letter-spacing: 6px;
      color: var(--gb-pale);
      text-transform: uppercase;
      margin-bottom: 6px;
      animation: flicker 4s infinite;
    }

    .title-main {
      font-size: clamp(18px, 3vw, 30px);
      color: var(--gb-bright);
      text-shadow:
        3px 3px 0 var(--gb-mid),
        6px 6px 0 var(--gb-dark);
      letter-spacing: 2px;
      line-height: 1.4;
      animation: glow-pulse 3s ease-in-out infinite;
    }

    .title-sub {
      font-family: 'VT323', monospace;
      font-size: 16px;
      color: var(--gb-pale);
      letter-spacing: 4px;
      margin-top: 8px;
      opacity: 0.7;
    }

    /* pixel divider */
    .px-divider {
      width: 100%;
      max-width: 960px;
      height: 4px;
      margin: 18px auto 0;
      background: repeating-linear-gradient(
        90deg,
        var(--gb-mid) 0px, var(--gb-mid) 8px,
        transparent 8px, transparent 12px
      );
    }

    /* ══════════════ MAIN LAYOUT ══════════════ */
    .layout {
      width: 100%;
      max-width: 1060px;
      padding: 0 24px 40px;
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 20px;
      align-items: start;
      margin-top: 20px;
    }

    /* ══════════════ CONTROLS PANEL ══════════════ */
    .controls-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .panel-label {
      font-size: 7px;
      letter-spacing: 3px;
      color: var(--gb-pale);
      text-transform: uppercase;
      border-bottom: 2px solid var(--gb-mid);
      padding-bottom: 8px;
      margin-bottom: 2px;
    }

    .ctrl-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ctrl-item {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 10px;
      background: var(--gb-dark);
      border: 2px solid var(--gb-mid);
      border-left: 4px solid var(--gb-light);
      position: relative;
      transition: border-color 0.15s;
    }

    .ctrl-item:hover {
      border-color: var(--gb-pale);
      border-left-color: var(--gb-bright);
    }

    .ctrl-action {
      font-family: 'VT323', monospace;
      font-size: 13px;
      color: var(--gb-pale);
      letter-spacing: 1px;
      line-height: 1.3;
    }

    .ctrl-keys {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
    }

    .key {
      display: inline-block;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--gb-black);
      background: var(--gb-bright);
      padding: 3px 6px;
      border: 2px solid var(--gb-white);
      border-bottom: 4px solid var(--gb-mid);
      border-right: 4px solid var(--gb-mid);
      white-space: nowrap;
      line-height: 1.4;
      image-rendering: pixelated;
    }

    .key-sep {
      font-family: 'VT323', monospace;
      font-size: 12px;
      color: var(--gb-mid);
    }

    .ctrl-note {
      font-family: 'VT323', monospace;
      font-size: 11px;
      color: var(--gb-light);
      opacity: 0.8;
      line-height: 1.3;
    }

    /* pixel art sword decoration */
    .sword-deco {
      margin: 4px auto;
      width: 100%;
      text-align: center;
    }

    .sword-deco svg {
      width: 48px;
      height: 48px;
      image-rendering: pixelated;
      filter: drop-shadow(0 0 6px var(--gb-light));
      animation: sword-bob 2s ease-in-out infinite;
    }

    /* ══════════════ GAME FRAME ══════════════ */
    .game-wrap {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* outer bezel — Game Boy shell feel */
    .game-bezel {
      background: var(--gb-dark);
      border: 3px solid var(--gb-mid);
      box-shadow:
        0 0 0 1px var(--gb-black),
        0 0 24px rgba(90,158,74,0.2),
        inset 0 0 12px rgba(0,0,0,0.5);
      position: relative;
    }

    /* corner pixel dots */
    .game-bezel::before,
    .game-bezel::after {
      content: '';
      position: absolute;
      width: 6px;
      height: 6px;
      background: var(--gb-light);
    }
    .game-bezel::before { top: 6px; left: 6px; }
    .game-bezel::after  { top: 6px; right: 6px; }

    .screen-surround {
      margin: 14px;
      background: var(--gb-black);
      border: 3px solid var(--gb-mid);
      box-shadow: inset 0 0 16px rgba(155,188,15,0.08);
      position: relative;
    }

    /* bottom corners */
    .screen-surround::before,
    .screen-surround::after {
      content: '';
      position: absolute;
      width: 6px;
      height: 6px;
      background: var(--gb-light);
    }
    .screen-surround::before { bottom: 6px; left: 6px; }
    .screen-surround::after  { bottom: 6px; right: 6px; }

    /* the actual noVNC iframe */
    #game-frame {
      display: block;
      width: 100%;
      aspect-ratio: 960 / 864;
      border: none;
      image-rendering: pixelated;
      background: var(--gb-black);
    }

    /* loading overlay */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: var(--gb-black);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 10;
      transition: opacity 0.5s;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-text {
      font-size: 8px;
      color: var(--gb-pale);
      animation: blink 1s step-end infinite;
    }

    .loading-bar-wrap {
      width: 160px;
      height: 12px;
      border: 2px solid var(--gb-mid);
    }

    .loading-bar {
      height: 100%;
      background: var(--gb-light);
      animation: loading-fill 8s ease-out forwards;
    }

    /* bottom bezel bar */
    .bezel-bottom {
      padding: 8px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .bezel-brand {
      font-size: 6px;
      color: var(--gb-mid);
      letter-spacing: 2px;
    }

    .bezel-dots {
      display: flex;
      gap: 5px;
    }

    .bezel-dot {
      width: 5px;
      height: 5px;
      background: var(--gb-mid);
    }

    /* status bar below frame */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px;
      background: var(--gb-dark);
      border: 2px solid var(--gb-mid);
      border-top: none;
      font-family: 'VT323', monospace;
      font-size: 13px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--gb-light);
      display: inline-block;
      margin-right: 6px;
      animation: blink 1.4s step-end infinite;
    }

    .status-dot.connected {
      background: var(--gb-bright);
      animation: none;
    }

    .status-text { color: var(--gb-pale); }
    .status-hint { color: var(--gb-mid); font-size: 11px; }

    /* ══════════════ ANIMATIONS ══════════════ */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96%           { opacity: 0.4; }
      97%           { opacity: 1; }
      98%           { opacity: 0.6; }
    }

    @keyframes glow-pulse {
      0%, 100% { text-shadow: 3px 3px 0 var(--gb-mid), 6px 6px 0 var(--gb-dark); }
      50%       { text-shadow: 3px 3px 0 var(--gb-mid), 6px 6px 0 var(--gb-dark),
                               0 0 20px rgba(200,212,104,0.4); }
    }

    @keyframes loading-fill {
      0%   { width: 0%; }
      30%  { width: 40%; }
      60%  { width: 65%; }
      85%  { width: 85%; }
      100% { width: 95%; }
    }

    @keyframes sword-bob {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%       { transform: translateY(-4px) rotate(3deg); }
    }

    /* ══════════════ RESPONSIVE ══════════════ */
    @media (max-width: 720px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .controls-panel {
        order: 2;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .panel-label { grid-column: 1 / -1; }
      .sword-deco  { display: none; }
      .game-wrap   { order: 1; }
    }
  </style>
</head>
<body>

<header>
  <div class="title-block">
    <div class="title-eyebrow">▸ adventure awaits ◂</div>
    <div class="title-main">THE TALE OF KELDA</div>
    <div class="title-sub">── beta ──</div>
  </div>
  <div class="px-divider"></div>
</header>

<div class="layout">

  <!-- ══ CONTROLS ══ -->
  <aside class="controls-panel">
    <div class="panel-label">controls</div>

    <div class="ctrl-group">

      <div class="ctrl-item">
        <div class="ctrl-action">Start Game</div>
        <div class="ctrl-keys">
          <span class="key">ENTER</span>
        </div>
      </div>

      <div class="ctrl-item">
        <div class="ctrl-action">Move</div>
        <div class="ctrl-keys">
          <span class="key">◄</span>
          <span class="key">▲</span>
          <span class="key">▼</span>
          <span class="key">►</span>
        </div>
      </div>

      <div class="ctrl-item">
        <div class="ctrl-action">Jump</div>
        <div class="ctrl-keys">
          <span class="key">X</span>
          <span class="key-sep">/</span>
          <span class="key">▲</span>
        </div>
        <div class="ctrl-note">double jump available</div>
      </div>

      <div class="ctrl-item">
        <div class="ctrl-action">Melee Power</div>
        <div class="ctrl-keys">
          <span class="key">Z</span>
          <span class="key-sep">tap</span>
        </div>
        <div class="ctrl-note">also deflects enemy fire</div>
      </div>

      <div class="ctrl-item">
        <div class="ctrl-action">Ranged Power</div>
        <div class="ctrl-keys">
          <span class="key">Z</span>
          <span class="key-sep">hold</span>
        </div>
      </div>

    </div>

    <div class="sword-deco">
      <!-- pixel sword SVG -->
      <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <rect x="7" y="1" width="2" height="9" fill="#c8d468"/>
        <rect x="6" y="2" width="1" height="7" fill="#8dc67a" opacity="0.5"/>
        <rect x="4" y="9" width="8" height="2" fill="#5a9e4a"/>
        <rect x="5" y="9" width="6" height="1" fill="#8dc67a" opacity="0.4"/>
        <rect x="7" y="11" width="2" height="4" fill="#2d5a27"/>
        <rect x="7" y="1" width="1" height="1" fill="#e8f8b0"/>
      </svg>
    </div>

  </aside>

  <!-- ══ GAME FRAME ══ -->
  <div class="game-wrap">
    <div class="game-bezel">
      <div class="screen-surround">

        <div class="loading-overlay" id="loading">
          <div class="title-main" style="font-size:10px">LOADING</div>
          <div class="loading-bar-wrap">
            <div class="loading-bar"></div>
          </div>
          <div class="loading-text">connecting to server...</div>
        </div>

        <iframe
          id="game-frame"
          src=""
          allowfullscreen
          scrolling="no"
          title="The Tale of Kelda"
        ></iframe>

      </div>

      <div class="bezel-bottom">
        <span class="bezel-brand">sinextra · game boy style</span>
        <div class="bezel-dots">
          <div class="bezel-dot"></div>
          <div class="bezel-dot"></div>
          <div class="bezel-dot"></div>
        </div>
      </div>
    </div>

    <div class="status-bar">
      <span>
        <span class="status-dot" id="status-dot"></span>
        <span class="status-text" id="status-text">connecting…</span>
      </span>
      <span class="status-hint">click game to capture keyboard</span>
    </div>
  </div>

</div>

<script>
  const frame = document.getElementById('game-frame');
  
  // Determina a porta do VNC. 
  // Se estivermos em um ambiente onde a porta 6080 está exposta (como local), usamos ela.
  // Se não, tentamos usar a mesma porta do site (proxy).
  const vncPort = window.location.port === '8080' ? '6080' : window.location.port;
  const vncHost = window.location.hostname;
  const vncProtocol = window.location.protocol;
  
  // Tenta carregar o noVNC da porta 6080 primeiro (mais estável)
  // Se falhar, o proxy do serve.py (se existir) seria o fallback, mas vamos focar na 6080.
  // Para deploy em nuvem (Coolify/Docker), geralmente apenas uma porta é exposta.
  // Então vamos manter o caminho relativo, mas garantir que o websockify esteja no lugar certo.
  frame.src = `/vnc.html?autoconnect=true&resize=scale&show_dot=false&toolbar=false&bell=false&path=websockify`;
  const overlay = document.getElementById('loading');
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');

  // Hide loading overlay when iframe loads
  frame.addEventListener('load', () => {
    setTimeout(() => {
      overlay.classList.add('hidden');
      dot.classList.add('connected');
      txt.textContent = 'connected';
    }, 1200);
  });

  // Fallback: hide after 15s regardless, but check if frame is actually responsive
  setTimeout(() => {
    if (!overlay.classList.contains('hidden')) {
      overlay.querySelector('.loading-text').textContent = 'Still trying to connect...';
      overlay.querySelector('.loading-text').style.color = '#ff4444';
    }
  }, 15000);
</script>

</body>
</html>
