services:
  kelda:
    build: .
    container_name: tale-of-kelda
    ports:
      - "8080:8080"   # noVNC (browser)
      - "5900:5900"   # VNC direto (opcional, pode remover em produção)
    environment:
      SCREEN_WIDTH: 960    # 160 × 6 — múltiplo exato da resolução Game Boy
      SCREEN_HEIGHT: 864   # 144 × 6 — pixel perfeito sem distorção
      SCREEN_DEPTH: 24
      VNC_PORT: 5900
      NOVNC_PORT: 8080
    # Cada usuário = um container separado via Coolify
    # Em produção, remova a porta 5900 e deixe só a 8080
    restart: unless-stopped
    shm_size: "256mb"   # Wine precisa de shared memory
