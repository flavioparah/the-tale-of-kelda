[supervisord]
nodaemon=true
user=root

[program:xvfb]
command=/usr/bin/Xvfb :1 -screen 0 960x864x24
autorestart=true

[program:x11vnc]
command=/usr/bin/x11vnc -display :1 -nopw -forever -shared -rfbport 5900
autorestart=true

[program:novnc]
command=/usr/bin/websockify --web /usr/share/novnc/ 8080 localhost:5900
autorestart=true

[program:kelda]
command=/home/kelda/startup.sh
startsecs=10
autorestart=true
user=root