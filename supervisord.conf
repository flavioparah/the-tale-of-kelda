[supervisord]
nodaemon=true
user=kelda
logfile=/tmp/supervisord.log
pidfile=/tmp/supervisord.pid

; 1. Display virtual
[program:xvfb]
command=Xvfb :1 -screen 0 %(ENV_SCREEN_WIDTH)sx%(ENV_SCREEN_HEIGHT)sx%(ENV_SCREEN_DEPTH)s -ac +extension GLX +render -noreset
autorestart=true
priority=10
stdout_logfile=/tmp/xvfb.log
stderr_logfile=/tmp/xvfb.log

; 2. Servidor VNC
[program:x11vnc]
command=x11vnc -display :1 -rfbport %(ENV_VNC_PORT)s -nopw -forever -shared -noxdamage -noxfixes
autorestart=true
priority=20
startsecs=3
stdout_logfile=/tmp/x11vnc.log
stderr_logfile=/tmp/x11vnc.log

; 3. noVNC — WebSocket para browser
[program:novnc]
command=/usr/share/novnc/utils/novnc_proxy --vnc localhost:%(ENV_VNC_PORT)s --listen %(ENV_NOVNC_PORT)s
autorestart=true
priority=30
startsecs=4
stdout_logfile=/tmp/novnc.log
stderr_logfile=/tmp/novnc.log

; 4. The Tale of Kelda via Wine + Mono
[program:kelda]
command=/home/kelda/startup.sh
autorestart=false
priority=40
startsecs=8
stdout_logfile=/tmp/kelda.log
stderr_logfile=/tmp/kelda.log
