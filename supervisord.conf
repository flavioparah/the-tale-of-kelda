[supervisord]
nodaemon=true
logfile=/tmp/supervisord.log
pidfile=/tmp/supervisord.pid
user=kelda

; 1. Display virtual
[program:xvfb]
command=Xvfb :1 -screen 0 %(ENV_SCREEN_WIDTH)sx%(ENV_SCREEN_HEIGHT)sx%(ENV_SCREEN_DEPTH)s -ac +extension GLX +render -noreset
autorestart=true
priority=10
stdout_logfile=/tmp/xvfb.log
stderr_logfile=/tmp/xvfb.log
startsecs=1

; 2. VNC server
[program:x11vnc]
command=x11vnc -display :1 -rfbport %(ENV_VNC_PORT)s -nopw -forever -shared -noxdamage -noxfixes -noncache
autorestart=true
priority=20
startsecs=3
stdout_logfile=/tmp/x11vnc.log
stderr_logfile=/tmp/x11vnc.log

; 3. noVNC WebSocket proxy — tenta ambos os caminhos possíveis no Ubuntu 24
[program:novnc]
command=bash -c "
  if [ -f /usr/share/novnc/utils/novnc_proxy ]; then
    exec /usr/share/novnc/utils/novnc_proxy --vnc localhost:%(ENV_VNC_PORT)s --listen 6080
  elif [ -f /usr/share/novnc/utils/launch.sh ]; then
    exec /usr/share/novnc/utils/launch.sh --vnc localhost:%(ENV_VNC_PORT)s --listen 6080
  else
    exec websockify --web /usr/share/novnc 6080 localhost:%(ENV_VNC_PORT)s
  fi
"
autorestart=true
priority=30
startsecs=4
stdout_logfile=/tmp/novnc.log
stderr_logfile=/tmp/novnc.log

; 4. Servidor web customizado — serve index.html + delega para noVNC
[program:webserver]
command=python3 /home/kelda/serve.py
autorestart=true
priority=35
startsecs=2
stdout_logfile=/tmp/web.log
stderr_logfile=/tmp/web.log

; 5. The Tale of Kelda via Wine
[program:kelda]
command=/home/kelda/startup.sh
autorestart=false
priority=40
startsecs=10
stdout_logfile=/tmp/kelda.log
stderr_logfile=/tmp/kelda.log
